# Backend host nginx config:
#   /static/        -> Django collectstatic output on local disk
#   /media/         -> User uploads on local disk
#   /api/, /admin/  -> gunicorn via unix socket
#   /api/health/    -> proxied (covers both nginx and gunicorn liveness)

upstream gunicorn {
    server unix:/home/ubuntu/tenants_back/run/gunicorn.sock fail_timeout=0;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/tenants.access.log;
    error_log  /var/log/nginx/tenants.error.log;

    client_max_body_size 50M;
    client_body_timeout  60s;
    keepalive_timeout    65s;

    # ALB health check - hits gunicorn so it also covers the Python process.
    location = /api/health/ {
        access_log off;
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }

    # Django collectstatic output (admin CSS/JS, DRF browsable API assets).
    location /static/ {
        alias /home/ubuntu/tenants_back/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
        access_log off;
        try_files $uri =404;
    }

    # User-uploaded media (if used).
    location /media/ {
        alias /home/ubuntu/tenants_back/media/;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # API + admin -> gunicorn.
    location ~ ^/(api|admin)/ {
        proxy_pass         http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        proxy_no_cache     1;
    }

    location / { return 404; }
}
